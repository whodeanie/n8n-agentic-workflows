name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: |
          npm ci

      - name: Run TypeScript workflow validation
        run: |
          npm run validate:ts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run workflow validation script
        run: |
          python3 scripts/validate_workflows.py

      - name: Install test dependencies
        run: |
          pip install pytest

      - name: Run pytest
        run: |
          python3 -m pytest tests/test_workflows_valid.py -v
