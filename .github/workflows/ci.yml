name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run workflow validation script
        run: |
          python scripts/validate_workflows.py

      - name: Install test dependencies
        run: |
          pip install pytest

      - name: Run pytest
        run: |
          pytest tests/test_workflows_valid.py -v
